# ===========================================
# Grammarly Clone - Development Services (Remote DB)
# ===========================================
# Use when DATABASE_URL is configured with a remote host
# Use: docker-compose -f docker-compose.dev.yml up -d
#
# Note: scripts/linux/start.sh will automatically detect
# whether to use this file based on your DATABASE_URL

services:
  # Redis Cache (only - MySQL is remote)
  redis:
    image: redis:7-alpine
    container_name: grammarly_redis
    restart: unless-stopped
    ports:
      - "6381:6379"
    volumes:
      - grammarly_redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  grammarly_redis_data:
    name: grammarly_redis_data

networks:
  default:
    name: grammarly_network
