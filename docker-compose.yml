services:
  # PostgreSQL Database - REMOVED (using remote Neon DB)
  # Connection string configured in api service environment


  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: grammarly_remotedb_redis
    restart: unless-stopped
    ports:
      - "6381:6379"
    volumes:
      - grammarly_remotedb_redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Ollama (AI Local) - OPTIONAL: use `docker compose --profile ollama up -d` to include
  ollama:
    image: ollama/ollama:latest
    container_name: grammarly_remotedb_ollama
    restart: unless-stopped
    profiles:
      - ollama
    ports:
      - "11434:11434"
    volumes:
      - grammarly_remotedb_ollama_data:/root/.ollama
    # Descomente o bloco abaixo se tiver GPU NVIDIA configurada no Docker
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

    # API Backend
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: grammarly_remotedb_api
    restart: unless-stopped
    ports:
      - "3002:3001"
    healthcheck:
      test: [ "CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3001/health', (res) => { if (res.statusCode !== 200) { console.log(res.statusCode); process.exit(1); } })\"" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    environment:
      # IMPORTANTE: Atualize a DATABASE_URL para seu servidor MySQL remoto
      # Formato: mysql://usuario:senha@host:porta/database
      - DATABASE_URL=mysql://usuario:senha@seu-mysql-host:3306/grammarly
      - REDIS_URL=redis://grammarly_remotedb_redis:6379
      - OLLAMA_BASE_URL=http://grammarly_remotedb_ollama:11434
      - JWT_SECRET=sua-chave-secreta-muito-segura-aqui-min-32-chars
      - AI_PROVIDER=groq
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - GROK_API_KEY=${GROK_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OLLAMA_MODEL=mistral
    depends_on:
      redis:
        condition: service_healthy
      # Ollama dependency removed (it's now optional)

      # Web Dashboard
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: grammarly_remotedb_web
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  grammarly_remotedb_redis_data:
    name: grammarly_remotedb_redis_data
  grammarly_remotedb_ollama_data:
    name: grammarly_remotedb_ollama_data

networks:
  default:
    name: grammarly_remotedb_network
