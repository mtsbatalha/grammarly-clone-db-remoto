services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: grammarly_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: grammarly_clone
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: grammarly_redis
    restart: unless-stopped
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Ollama (AI Local)
  ollama:
    image: ollama/ollama:latest
    container_name: grammarly_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Descomente o bloco abaixo se tiver GPU NVIDIA configurada no Docker
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # API Backend
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: grammarly_api
    restart: unless-stopped
    ports:
      - "3002:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/grammarly_clone?schema=public
      - REDIS_URL=redis://redis:6379
      - OLLAMA_BASE_URL=http://ollama:11434
      - JWT_SECRET=sua-chave-secreta-muito-segura-aqui-min-32-chars
      - AI_PROVIDER=groq
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - GROK_API_KEY=${GROK_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OLLAMA_MODEL=mistral
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started

  # Web Dashboard
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: grammarly_web
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  ollama_data:

networks:
  default:
    name: grammarly_network
